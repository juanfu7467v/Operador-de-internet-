# fly.toml app configuration file generated for internet-movistar on 2026-07-02T02:29:56Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'internet-movistar'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = false           # <-- CAMBIAR A false (Permite conexiones sin encriptar)
  auto_stop_machines = 'off'    # <-- RECOMENDADO 'off' para evitar que la máquina se apague sola
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
