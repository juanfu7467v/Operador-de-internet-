app = 'laboratorio-prueva-red'
primary_region = 'dfw'

[build]

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    # Al dejar handlers vacío [], el proxy de Fly.io NO toca el TLS.
    # Deja pasar m.facebook.com directamente a tu contenedor.
    handlers = []
    port = 443

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
