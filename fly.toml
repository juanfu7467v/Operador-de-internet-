app = 'laboratorio-prueva-red'
primary_region = 'dfw'

[build]

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    # Dejar handlers vacío [] es el truco para que Fly.io no valide el SSL 
    # y deje pasar cualquier SNI que le envíes
    handlers = [] 
    port = 443

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
