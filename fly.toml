app = "laboratorio-prueva-red"
primary_region = "dfw"

[build]

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ["tls"]
    port = 443

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
